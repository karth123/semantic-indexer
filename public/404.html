<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AnchorWrite</title>
    <script>
      const path = window.location.pathname.replace('/semantic-indexer', '');
      const search = window.location.search || '';
      const hash = window.location.hash || '';
      window.location.replace('/semantic-indexer/' + '?redirect=' + encodeURIComponent(path + search + hash));
    </script>
  </head>
  <body></body>
</html>
